<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0b0b0b;
    --card: #111;
    --card2: #161616;
    --border: #1c1c1c;
    --border2: #252525;
    --text: #ededed;
    --sub: #444;
    --dim: #777;
    --blue: #5b8dee;
    --green: #3ecf8e;
    --red: #e05c5c;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 52px 20px 100px;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 72px;
  }

  .logo {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo b { color: var(--blue); }

  .nav-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--sub);
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border2);
    padding: 4px 10px;
    border-radius: 99px;
  }

  .hero { margin-bottom: 40px; }

  .hero h1 {
    font-size: clamp(2rem, 7vw, 3rem);
    font-weight: 300;
    letter-spacing: -1.5px;
    line-height: 1.1;
  }

  .hero h1 strong { font-weight: 600; }

  .search-wrap {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 60px;
    transition: border-color 0.2s;
  }

  .search-wrap:focus-within { border-color: #2e2e2e; }

  .search-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 15px 18px;
    outline: none;
  }

  .search-wrap input::placeholder { color: var(--sub); }

  .search-wrap button {
    background: var(--blue);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 15px 22px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .search-wrap button:hover { opacity: 0.85; }
  .search-wrap button:disabled { opacity: 0.3; cursor: not-allowed; }

  .err {
    display: none;
    font-size: 0.78rem;
    color: var(--red);
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
  }

  .loader { display: none; padding: 56px 0; }

  .lbar {
    width: 100px;
    height: 1px;
    background: var(--border2);
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  .lbar::after {
    content: '';
    position: absolute;
    left: -60%;
    width: 60%;
    height: 100%;
    background: var(--blue);
    animation: ls 1s ease infinite;
  }

  @keyframes ls { to { left: 120%; } }

  #result { display: none; animation: fu 0.3s ease; }

  @keyframes fu {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* PROFILE CARD */
  .pcard {
    display: flex;
    gap: 24px;
    align-items: flex-end;
    margin-bottom: 32px;
  }

  .av-wrap { flex-shrink: 0; position: relative; }

  .av-full {
    width: 120px;
    height: 120px;
    border-radius: 14px;
    background: var(--card2);
    border: 1px solid var(--border2);
    object-fit: cover;
    display: block;
  }

  .status-pip {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 2px solid var(--bg);
  }

  .pip-online  { background: var(--green); }
  .pip-ingame  { background: var(--blue); }
  .pip-offline { background: var(--sub); }

  .pright { flex: 1; min-width: 0; padding-bottom: 4px; }

  .pname {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.4px;
    margin-bottom: 3px;
    word-break: break-word;
  }

  .pmeta {
    font-family: 'DM Mono', monospace;
    font-size: 0.67rem;
    color: var(--sub);
    margin-bottom: 10px;
  }

  .pdesc {
    font-size: 0.82rem;
    color: var(--dim);
    line-height: 1.65;
    margin-bottom: 12px;
    word-break: break-word;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; }

  .chip {
    font-size: 0.63rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 5px;
  }

  .c-online  { background: rgba(62,207,142,0.1);  color: var(--green); }
  .c-ingame  { background: rgba(91,141,238,0.12); color: var(--blue); }
  .c-offline { background: rgba(80,80,80,0.12);   color: var(--sub); }
  .c-verify  { background: rgba(255,255,255,0.05);color: #666; }
  .c-banned  { background: rgba(224,92,92,0.1);   color: var(--red); }

  hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .stat { background: var(--card); padding: 16px 12px; text-align: center; }
  .stat-v { font-size: 1rem; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
  .stat-l { font-size: 0.58rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }

  /* SECTION */
  .sec { margin-bottom: 36px; }

  .sec-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  /* DETAILS TABLE */
  .trow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .trow:last-child { border: none; }
  .tk { font-size: 0.8rem; color: var(--dim); }
  .tv { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text); text-align: right; word-break: break-all; }

  /* FRIENDS */
  .fgrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }

  .fcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px 12px;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .fcard:hover { background: var(--card2); border-color: var(--border2); }

  .fav-full {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    background: var(--card2);
    border: 1px solid var(--border2);
    margin: 0 auto 8px;
    display: block;
    object-fit: cover;
  }

  .fname { font-size: 0.72rem; font-weight: 500; color: var(--text); word-break: break-word; line-height: 1.3; margin-bottom: 2px; }
  .fuser { font-size: 0.6rem; color: var(--sub); word-break: break-word; font-family: 'DM Mono', monospace; }

  /* GROUPS */
  .gitem {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }

  .gitem:last-child { border: none; }

  .gthumb {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: var(--card2);
    border: 1px solid var(--border2);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--sub);
  }

  .gthumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .gname { font-size: 0.85rem; font-weight: 500; margin-bottom: 2px; }
  .grole { font-size: 0.68rem; color: var(--sub); font-family: 'DM Mono', monospace; }

  footer {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--sub);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  @media(max-width:500px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .pcard { flex-direction: column; align-items: center; text-align: center; }
    .chips { justify-content: center; }
    .tv { text-align: left; }
  }
</style>
</head>
<body>
<div class="page">

  <nav>
    <div class="logo">Vexr<b>a</b></div>
    <div class="nav-tag">Roblox Lookup</div>
  </nav>

  <div class="hero">
    <h1>Find any<br><strong>Roblox profile.</strong></h1>
  </div>

  <div class="search-wrap">
    <input type="text" id="inp" placeholder="Enter username" autocomplete="off" />
    <button id="btn" onclick="lookup()">Search</button>
  </div>

  <div class="err" id="err"></div>
  <div class="loader" id="load"><div class="lbar"></div></div>

  <div id="result">

    <div class="pcard">
      <div class="av-wrap">
        <img class="av-full" id="av" src="" alt="" />
        <div class="status-pip" id="pip"></div>
      </div>
      <div class="pright">
        <div class="pname" id="pname"></div>
        <div class="pmeta" id="pmeta"></div>
        <div class="pdesc" id="pdesc"></div>
        <div class="chips" id="chips"></div>
      </div>
    </div>

    <hr>

    <div class="stats" id="stats"></div>

    <div class="sec">
      <div class="sec-label">Details</div>
      <div id="details"></div>
    </div>

    <div class="sec" id="fsec" style="display:none">
      <div class="sec-label">Friends</div>
      <div class="fgrid" id="fgrid"></div>
    </div>

    <div class="sec" id="gsec" style="display:none">
      <div class="sec-label">Groups</div>
      <div id="glist"></div>
    </div>

  </div>

  <footer>Vexra</footer>
</div>

<script>
const P = "https://corsproxy.io/?";
const get = u => fetch(P+encodeURIComponent(u)).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});
const post = (u,b) => fetch(P+encodeURIComponent(u),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());

const fmt = n => { if(n==null)return '—'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toLocaleString(); };
const fdate = d => d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—';
const row = (k,v) => `<div class="trow"><span class="tk">${k}</span><span class="tv">${v??'—'}</span></div>`;

document.getElementById('inp').onkeydown = e => e.key==='Enter' && lookup();

async function lookup() {
  const u = document.getElementById('inp').value.trim();
  if(!u) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('load').style.display = 'block';
  document.getElementById('btn').disabled = true;

  try {
    const ud = await post('https://users.roblox.com/v1/usernames/users',{usernames:[u],excludeBannedUsers:false});
    if(!ud.data?.length) throw new Error(`"${u}" not found`);
    const id = ud.data[0].id;

    const [info, pres, friends, groups, thumb] = await Promise.allSettled([
      get(`https://users.roblox.com/v1/users/${id}`),
      post('https://presence.roblox.com/v1/presence/users',{userIds:[id]}),
      get(`https://friends.roblox.com/v1/users/${id}/friends?limit=50`),
      get(`https://groups.roblox.com/v1/users/${id}/groups/roles`),
      get(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${id}&size=420x420&format=Png`)
    ]);

    const I = info.value ?? {};
    const PR = pres.value?.userPresences?.[0];
    const pt = PR?.userPresenceType ?? 0;
    const F = friends.value?.data ?? [];
    const G = groups.value?.data ?? [];
    const imgUrl = thumb.value?.data?.[0]?.imageUrl ?? '';

    document.getElementById('av').src = imgUrl;

    // Status pip
    const pip = document.getElementById('pip');
    pip.className = 'status-pip ' + (pt===2?'pip-ingame':pt>=1?'pip-online':'pip-offline');

    document.getElementById('pname').textContent = I.displayName || I.name || u;
    document.getElementById('pmeta').textContent = `@${I.name} · ${id}`;
    document.getElementById('pdesc').textContent = I.description?.trim() || 'No description.';

    const ptLabels = ['Offline','Online','In Game','In Studio'];
    const ptClass  = ['c-offline','c-online','c-ingame','c-ingame'];
    let chips = `<span class="chip ${ptClass[pt]??'c-offline'}">${ptLabels[pt]??'Unknown'}</span>`;
    if(I.hasVerifiedBadge) chips += `<span class="chip c-verify">Verified</span>`;
    if(I.isBanned) chips += `<span class="chip c-banned">Banned</span>`;
    document.getElementById('chips').innerHTML = chips;

    const ageDays = I.created ? Math.floor((Date.now()-new Date(I.created))/864e5) : null;
    const ageStr = ageDays!=null ? (ageDays/365).toFixed(1)+'y' : '—';

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-v">${fmt(F.length)}</div><div class="stat-l">Friends</div></div>
      <div class="stat"><div class="stat-v">${fmt(G.length)}</div><div class="stat-l">Groups</div></div>
      <div class="stat"><div class="stat-v">${ageStr}</div><div class="stat-l">Age</div></div>
      <div class="stat"><div class="stat-v">${ptLabels[pt]??'—'}</div><div class="stat-l">Status</div></div>
    `;

    document.getElementById('details').innerHTML =
      row('Username', I.name) +
      row('Display Name', I.displayName) +
      row('User ID', id) +
      row('Joined', fdate(I.created)) +
      row('Last Location', PR?.lastLocation || '—') +
      row('Verified', I.hasVerifiedBadge ? 'Yes' : 'No') +
      row('Banned', I.isBanned ? 'Yes' : 'No');

    // Friends — full body + display name + @username
    const fsec = document.getElementById('fsec');
    if(F.length) {
      const fids = F.slice(0,24).map(f=>f.id);
      let ft = {};
      try {
        const r = await get(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${fids.join(',')}&size=150x150&format=Png`);
        r.data?.forEach(t=>{ ft[t.targetId]=t.imageUrl; });
      } catch(e){}

      document.getElementById('fgrid').innerHTML = F.slice(0,24).map(f=>`
        <div class="fcard">
          <img class="fav-full" src="${ft[f.id]||''}" alt="${f.name}" onerror="this.style.opacity=0.1"/>
          <div class="fname">${f.displayName||f.name}</div>
          <div class="fuser">@${f.name}</div>
        </div>
      `).join('');
      fsec.style.display = '';
    } else { fsec.style.display = 'none'; }

    // Groups — with thumbnails
    const gsec = document.getElementById('gsec');
    if(G.length) {
      const gids = G.slice(0,15).map(g=>g.group?.id).filter(Boolean);
      let gicons = {};
      try {
        const r = await get(`https://thumbnails.roblox.com/v1/groups/icons?groupIds=${gids.join(',')}&size=150x150&format=Png`);
        r.data?.forEach(t=>{ gicons[t.targetId]=t.imageUrl; });
      } catch(e){}

      document.getElementById('glist').innerHTML = G.slice(0,15).map(g=>{
        const gid = g.group?.id;
        const icon = gicons[gid];
        return `
          <div class="gitem">
            <div class="gthumb">${icon?`<img src="${icon}" alt="" onerror="this.parentElement.innerHTML='#'"/>`:'#'}</div>
            <div>
              <div class="gname">${g.group?.name||'Group'}</div>
              <div class="grole">${g.role?.name||'Member'}</div>
            </div>
          </div>
        `;
      }).join('');
      gsec.style.display = '';
    } else { gsec.style.display = 'none'; }

    document.getElementById('result').style.display = 'block';

  } catch(e) {
    const el = document.getElementById('err');
    el.textContent = e.message || 'Something went wrong.';
    el.style.display = 'block';
  } finally {
    document.getElementById('load').style.display = 'none';
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
